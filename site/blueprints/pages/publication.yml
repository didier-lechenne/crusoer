title: Publication

options:
  changeTitle: true
  changeLanguage: false
  duplicate: true
  preview: true
  status: true
  url: true
  delete: true

tabs:
  principal:
    label: Contenu principal
    columns:
      - width: 3/4
        sections:
          metaPrincipal:
            type: fields
            fields:
              auteur_principal:
                label:
                  en: Author(s)
                  fr: Auteur·rice·s
                type: writer
                inline: true
                width: 1/2
                marks:
                  - italic
                  - sub
                  - sup
                  - clear

              auteur_index_principale:
                label:
                  en: Author(s)
                  fr: Auteur·rice·s
                type: structure
                fields:
                  nom:
                    label: Nom
                    type: text
                width: 1/2
                help: Champ technique pour l'index

              annee_principal:
                label:
                  en: Date
                  fr: Date
                type: writer
                inline: true
                width: 2/12

              titre_principal_home:
                label:
                  en: Title (home)
                  fr: Titre (Accueil)
                type: writer
                required: false
                inline: true
                width: 5/12
                marks:
                  - italic
                  - sub
                  - sup
                  - clear

              titre_principal:
                label:
                  en: Title
                  fr: Titre
                type: writer
                required: false
                inline: true
                width: 5/12
                marks:
                  - italic
                  - sub
                  - sup
                  - clear

              intro_principal:
                label:
                  en: Summary (home)
                  fr: Résumé (accueil)
                type: blocks
                max: 1
                width: 1/1
                # help: obligatoire
                fieldsets:
                  - markdown-chapo

              chapo_principal:
                label:
                  en: Chapo
                  fr: Chapo
                type: blocks
                max: 1
                # help: obligatoire
                fieldsets:
                  - markdown-chapo

              onglet_principal:
                label:
                  en: Tab title
                  fr: Titre de l'onglet
                type: writer
                inline: true
                help: Vide s'il n'y a pas de contenu secondaire
                marks:
                  - italic
                  - sub
                  - sup
                  - clear

              contenu_principal:
                label:
                  en: Content
                  fr: Contenu
                type: blocks
                fieldsets:
                  - label: Texte
                    type: group
                    fieldsets:
                      - heading
                      - markdown
                      - image
                      - video
                      - audio
                      - pdf
                      - pdf-inline
                      - spacer
                      - columns

      - width: 1/4
        sections:
          homePrincipal:
            type: fields
            fields:
              home_principal:
                label:
                  en: Show on homepage
                  fr: Afficher sur l'accueil
                type: toggle
                default: false
                text:
                  - non
                  - oui

          imagesPrincipal:
            headline: Images
            type: files
            query: page.images
            image:
              back: black

          pdfsPrincipal:
            headline: PDFs
            type: files
            template: pdf

  secondaire:
    label: Contenu secondaire
    columns:
      - width: 3/4
        sections:
          metaSecondaire:
            type: fields
            fields:
              auteur_secondaire:
                label:
                  en: Author(s)
                  fr: Auteur·rice·s
                type: writer
                inline: true
                width: 1/2
                marks:
                  - italic
                  - sub
                  - sup
                  - clear

              auteur_index_secondaire:
                label:
                  en: Author(s)
                  fr: Auteur·rice·s
                type: structure
                fields:
                  nom:
                    label: Nom
                    type: text
                width: 1/2
                help: Champ technique pour l'index

              annee_secondaire:
                label:
                  en: Date
                  fr: Date
                type: writer
                width: 2/12
                inline: true

              titre_secondaire_home:
                label:
                  en: Title (home)
                  fr: Titre (Accueil)
                type: writer
                inline: true
                width: 5/12
                marks:
                  - italic
                  - sub
                  - sup
                  - clear

              titre_secondaire:
                label:
                  en: Title
                  fr: Titre
                type: writer
                inline: true
                width: 5/12
                marks:
                  - italic
                  - sub
                  - sup
                  - clear

              intro_secondaire:
                label:
                  en: Summary (home)
                  fr: Résumé (Accueil)
                type: blocks
                max: 1
                width: 1/1
                fieldsets:
                  - markdown-chapo

              chapo_secondaire:
                label:
                  en: Chapo
                  fr: Chapo
                type: blocks
                max: 1
                fieldsets:
                  - markdown-chapo

              onglet_secondaire:
                label:
                  en: Tab title
                  fr: Titre de l'onglet
                type: writer
                inline: true
                marks:
                  - italic
                  - sub
                  - sup
                  - clear

              contenu_secondaire:
                label:
                  en: Content
                  fr: Contenu
                type: blocks
                fieldsets:
                  - label: Texte
                    type: group
                    fieldsets:
                      - heading
                      - markdown
                      - image
                      - video
                      - audio
                      - pdf
                      - pdf-inline
                      - spacer
                      - columns

      - width: 1/4
        sections:
          homeSecondaire:
            type: fields
            fields:
              home_secondaire:
                label:
                  en: Show on homepage
                  fr: Afficher sur l'accueil
                type: toggle
                default: false
                text:
                  - non
                  - oui

          imagesSecondaire:
            headline: Images
            type: files
            query: page.images
            image:
              back: black

          pdfsSecondaire:
            headline: PDFs
            type: files
            template: pdf
