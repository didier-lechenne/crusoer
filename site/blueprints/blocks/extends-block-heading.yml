  # text align
  textAlign:
    label:
      en: Text alignment
      fr: Alignement
    type: toggles
    labels: false
    default: left
    options:
      - value: left
        text:
          en: Left
          fr: Gauche
        icon: text-left
      - value: center
        text:
          en: Center
          fr: Centre
        icon: text-center
      - value: right
        text:
          en: Right
          fr: Droite
        icon: text-right
    width: 1/3

  # font family
  fontFamily:
    label:
      en: Font family
      fr: Police
    type: toggles
    labels: true
    default: serif
    options:
      - value: sans
        text: Sans
      - value: serif
        text: Serif
    width: 1/4

