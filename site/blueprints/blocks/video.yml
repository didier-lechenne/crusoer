name: field.blocks.video.name
icon: video
preview: video
fields:
  location:
    label: field.blocks.video.location
    type: radio
    columns: 2
    default: "kirby"
    options:
      kirby: "{{ t('field.blocks.image.location.internal') }}"
      web: "{{ t('field.blocks.image.location.external') }}"
  url:
    label: field.blocks.video.url.label
    type: url
    placeholder: field.blocks.video.url.placeholder
    when:
      location: web
  cover:
    label:
      en: Cover image
      fr: Image de couverture
    type: files
    query: model.images
    multiple: false
    when:
      location: web
  video:
    label: field.blocks.video.name
    type: files
    query: model.videos
    multiple: false
    # you might want to add a template for videos here
    when:
      location: kirby
  poster:
    label: field.blocks.video.poster
    type: files
    query: model.images
    multiple: false
    image:
      back: black
    uploads:
      template: blocks/image
    when:
      location: kirby

  class:
    label: Class
    type: text
    width: 1/4

  caption:
    label: field.blocks.video.caption
    type: writer
    inline: true
    width: 1/2
  captionLocation:
    label:
      en: Caption location
      fr: Emplacement légende
    type: toggles
    labels: false
    default: margin
    options:
      - value: margin
        text: { en: Margin, fr: Marge }
        icon: text-right
      - value: below
        text: { en: Below, fr: Sous la vidéo }
        icon: text-bottom
    width: 1/4
  captionAlign:
    label:
      en: Caption align
      fr: Alignement légende
    type: toggles
    labels: false
    default: bottom
    when:
      captionLocation: margin
    options:
      - value: top
        text: { en: Top, fr: Haut }
        icon: text-top
      - value: bottom
        text: { en: Bottom, fr: Bas }
        icon: text-bottom
    width: 1/4
  autoplay:
    label: field.blocks.video.autoplay
    type: toggle
    width: 1/3
    when:
      location: kirby
  muted:
    label: field.blocks.video.muted
    type: toggle
    width: 1/3
    default: false
    when:
      location: kirby
  loop:
    label: field.blocks.video.loop
    type: toggle
    width: 1/3
    when:
      location: kirby
  controls:
    label: field.blocks.video.controls
    type: toggle
    width: 1/3
    default: true
    when:
      location: kirby
  preload:
    label: field.blocks.video.preload
    type: select
    width: 2/3
    default: auto
    options:
      - auto
      - metadata
      - none
    when:
      location: kirby
