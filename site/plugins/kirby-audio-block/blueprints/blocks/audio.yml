name: Audio
icon: file-audio
tabs:
  main:
    label: Main
    fields:
      source:
        type: files
        query: page.audio
        uploads: audio
        multiple: false
        width: 1/2

      description:
        type: writer
        icon: text
        inline: true
        placeholder: Description
        marks:
          - bold
          - italic
          - sub
          - sup
          - clear
      captionLocation:
        label:
          en: Caption location
          fr: Emplacement légende
        type: toggles
        labels: false
        default: margin
        options:
          - value: margin
            text: { en: Margin, fr: Marge }
            icon: text-right
          - value: below
            text: { en: Below, fr: Sous l'audio }
            icon: text-bottom
        width: 1/2
      captionAlign:
        label:
          en: Caption align
          fr: Alignement légende
        type: toggles
        labels: false
        default: bottom
        when:
          captionLocation: margin
        options:
          - value: top
            text: { en: Top, fr: Haut }
            icon: text-top
          - value: bottom
            text: { en: Bottom, fr: Bas }
            icon: text-bottom
        width: 1/2
